server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ─── React Router fix ────────────────────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ─── Reverse Proxy to Backend ────────────────────────────────────────────────
    # Forward all API and Auth requests to the Spring Boot backend container.
    # Note: We use auth/login and auth/register specifically so we don't accidentally
    # proxy frontend routes like /auth/callback to the backend.
    location ~ ^/(api/|auth/login|auth/register|user/|oauth2/|login/oauth2/) {
        proxy_pass http://backend:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ─── WebSocket Proxy ─────────────────────────────────────────────────────────
    # SockJS uses sub-paths like /ws/info, /ws/123/abc/websocket — we must match
    # the prefix /ws/ (with trailing slash) to catch all of them.
    # The exact /ws match handles the initial SockJS negotiation request.
    location = /ws {
        return 301 /ws/;
    }

    location /ws/ {
        proxy_pass http://backend:8080/ws/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Keep WebSocket connections alive (24 hours)
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
        proxy_connect_timeout 60;
    }

    # ─── Cache static assets aggressively ────────────────────────────────────────
    # Vite generates hashed filenames (e.g., index-Bx3Kdf12.js) for every build.
    # These are safe to cache for 1 year because the filename changes on every build.
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # ─── Security headers ─────────────────────────────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ─── Gzip compression ────────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/xml+rss text/javascript;

    # ─── Hide Nginx version (security) ───────────────────────────────────────────
    server_tokens off;
}
