server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ─── React Router fix ────────────────────────────────────────────────────────
    # Try to serve the exact file, then the exact directory,
    # then fall back to index.html so React Router can handle the URL.
    # Without this, refreshing /dashboard returns a 404.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ─── Cache static assets aggressively ────────────────────────────────────────
    # Vite generates hashed filenames (e.g., index-Bx3Kdf12.js) for every build.
    # These are safe to cache for 1 year because the filename changes on every build.
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # ─── Security headers ─────────────────────────────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ─── Gzip compression ────────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/xml+rss text/javascript;

    # ─── Hide Nginx version (security) ───────────────────────────────────────────
    server_tokens off;
}
