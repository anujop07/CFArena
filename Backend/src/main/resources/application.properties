spring.application.name=CF_DuelProject

# ─── MongoDB ───────────────────────────────────────────────────────────────────
# Must be injected via environment variable. No hardcoded fallback allowed.
spring.data.mongodb.uri=${MONGODB_URI}
spring.data.mongodb.database=${MONGODB_DATABASE:cf_duel_db}
spring.data.mongodb.auto-index-creation=true

# ─── Google OAuth2 ─────────────────────────────────────────────────────────────
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.redirect-uri=${GOOGLE_REDIRECT_URI}
spring.security.oauth2.client.registration.google.scope=email,profile

# ─── JWT ───────────────────────────────────────────────────────────────────────
# Must be a cryptographically strong random string (min 64 chars). Inject at runtime.
JWT_SECRET=${JWT_SECRET}

# ─── Application URLs ──────────────────────────────────────────────────────────
frontend.url=${FRONTEND_URL}

# ─── Actuator (Health Check) ───────────────────────────────────────────────────
# Only expose the health endpoint — never expose env, beans, heap dump, etc.
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never

# ─── Logging ──────────────────────────────────────────────────────────────────
logging.level.root=INFO
logging.level.CF_DuelProject=INFO
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# ─── Server ────────────────────────────────────────────────────────────────────
server.port=8080
# Disable error details in response body (prevents stack trace exposure)
server.error.include-message=never
server.error.include-stacktrace=never
server.error.include-binding-errors=never