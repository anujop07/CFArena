services:
  jenkins:
    image: jenkins/jenkins:lts
    container_name: jenkins
    restart: unless-stopped
    # Run as root so Jenkins has permission to access /var/run/docker.sock
    user: root
    ports:
      - "8081:8080" # Jenkins web UI accessible on port 8081
      - "50000:50000"
    volumes:
      - jenkins_data:/var/jenkins_home
      # Allow Jenkins to run Docker commands to build/deploy your app
      - /var/run/docker.sock:/var/run/docker.sock
      - /usr/bin/docker:/usr/bin/docker
      # Also mount docker-compose plugin
      - /usr/libexec/docker/cli-plugins:/usr/libexec/docker/cli-plugins
      # Mount the project directory so Jenkins can run docker compose on the live files
      - ./:/opt/cfarena

volumes:
  jenkins_data:
